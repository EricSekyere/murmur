name: Build Linux

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 needs webkit2gtk-4.1 + GTK3 + appindicator; the app also needs
      # ALSA (cpal), X11/xdo (enigo, arboard, global-hotkey, rdev), and
      # cmake/clang to build whisper.cpp.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libxdo-dev \
            libx11-dev libxtst-dev libxi-dev libxcb1-dev \
            cmake clang libclang-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # APPIMAGE_EXTRACT_AND_RUN avoids the FUSE-not-available failure that
      # appimagetool hits on hosted runners.
      - name: Build Linux bundles (deb + AppImage)
        working-directory: crates/murmur-app
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          # createUpdaterArtifacts is on, so bundling signs the AppImage and
          # needs the updater key (the same secret the release job uses).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --bundles deb,appimage

      - uses: actions/upload-artifact@v4
        with:
          name: murmur-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
