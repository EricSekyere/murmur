name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    # Pinned to windows-2022: the "Visual Studio 17 2022" CMake generator
    # below needs a VS 2022 toolset CMake can detect, which windows-latest
    # (now a newer image) no longer provides — CMake fails with "could not
    # find any instance of Visual Studio".
    runs-on: windows-2022
    env:
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      # whisper.cpp must compile optimized: with CMAKE_GENERATOR unset,
      # cmake-rs overrides the MSVC Release flags and strips /O2 (see
      # build.sh for the full story). AVX2 covers every Intel/AMD CPU
      # since ~2013; the CI build is CPU-only so it runs on any machine
      # (the CUDA build remains a local build.sh option).
      CMAKE_GENERATOR: Visual Studio 17 2022
      CFLAGS: /DNDEBUG /arch:AVX2
      CXXFLAGS: /DNDEBUG /arch:AVX2
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # whisper-rs uses bindgen, which needs libclang. The runner usually
      # ships LLVM, but install it if missing and export the path so the
      # build never fails on "libclang.dll not found".
      - name: Ensure LLVM/libclang
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files\LLVM\bin\libclang.dll")) {
            choco install llvm --no-progress -y
          }
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing. Add these as repository secrets:
          #   TAURI_SIGNING_PRIVATE_KEY          contents of .tauri-signing-key.key
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD password (empty if none)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/murmur-app
          tagName: ${{ github.ref_name }}
          releaseName: "Murmur ${{ github.ref_name }}"
          releaseBody: |
            Voice-to-text dictation for Windows.

            **Install:** download the `.exe` installer below and run it.
            Models download automatically on first launch.

            Requires a CPU with AVX2 (any Intel/AMD CPU from ~2013 onward).
          releaseDraft: false
          prerelease: false
