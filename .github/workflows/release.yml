name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-2022
    env:
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      # whisper.cpp must compile optimized. Setting CMAKE_GENERATOR to any
      # value stops cmake-rs from overriding CMAKE_*_FLAGS_RELEASE and
      # stripping /O2 (the cause of an earlier ~100x slowdown — see build.sh).
      # Ninja is used instead of the "Visual Studio" generator because CMake's
      # VS-instance detection fails on hosted runners ("could not find any
      # instance of Visual Studio"). Ninja just compiles with cl.exe from the
      # MSVC dev environment set up below — no VS detection involved. CMake's
      # default CMAKE_C_FLAGS_RELEASE (/O2 /Ob2 /DNDEBUG) still applies, so the
      # build stays optimized. AVX2 covers every Intel/AMD CPU since ~2013.
      CMAKE_GENERATOR: Ninja
      CFLAGS: /DNDEBUG /arch:AVX2
      CXXFLAGS: /DNDEBUG /arch:AVX2
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # whisper-rs uses bindgen, which needs libclang. The runner usually
      # ships LLVM, but install it if missing and export the path so the
      # build never fails on "libclang.dll not found".
      - name: Ensure LLVM/libclang
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files\LLVM\bin\libclang.dll")) {
            choco install llvm --no-progress -y
          }
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Put cl.exe and the MSVC headers/libs on PATH for the Ninja build.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja --no-progress -y
          }

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — repository secret TAURI_SIGNING_PRIVATE_KEY.
          # The key has no password, so the password secret can be absent
          # (it resolves to an empty string, which the signer accepts).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/murmur-app
          tagName: ${{ github.ref_name }}
          releaseName: "Murmur ${{ github.ref_name }}"
          releaseBody: |
            Fast, private, on-device dictation for Windows.

            ## Fixes in 0.3.7

            - **Live caption sits correctly on scaled displays.** When the caption follows your active window, it now centers properly beneath it on high-DPI screens (125%, 150%, and up) instead of drifting off-center, and it no longer appears in a screen corner when there is no active window to anchor to.

            ## New in 0.3.6

            - **Live caption can follow your active window.** The live preview can now appear right next to the window you are typing into, the way macOS dictation does, instead of only under the floating pill. Pick where it shows in Settings, under Live caption position. Each caption clears the moment its text lands in the field.

            ## Fixes in 0.3.5

            - **The clipboard can no longer leak.** Murmur now types directly into every app, including terminals and chat apps like Warp. It no longer routes any output through the clipboard, so your previous clipboard contents can never be pasted into the focused window. If a specific app needs paste, choose the Clipboard + Paste output mode for it.

            ## Earlier in 0.3.4

            - **Stays offline.** Removed a Google Fonts request that fired on every launch, and stopped writing recognized text to the on-disk log.
            - **Recovers from a lost mic.** Unplugging the microphone mid-session now ends the session with a clear message instead of hanging.
            - **Model switching is safe.** Changing models while recording no longer drops the rest of the session.
            - **Clipboard and focus.** Wider window before restoring the clipboard after a terminal paste, an image clipboard is preserved, and dictation lands in the window you started in rather than one focus drifted to.
            - **Live preview is lighter.** The preview snapshot is bounded so long phrases no longer slow the final, and the capture buffer is capped.
            - **Many smaller fixes:** non-English context no longer leaks into non-English decodes, non-ASCII text survives developer-mode cleanup, a corrupt config recovers to defaults instead of failing to start, and a bare "undo" no longer fires Ctrl+Z.

            ## Also in 0.3.x

            - **Find pill.** A button in the dashboard flashes the floating pill so you can spot it, and pulls it back on-screen if it has been dragged off a monitor.

            - **Live preview.** Your words appear as you speak, in the dashboard and as a caption under the floating pill, before each phrase is final.
            - **Voice editing commands.** "select all", "copy that", "cut", "paste", "undo", "redo", "press tab", and "press escape", alongside "new line", "new paragraph", and "scratch that".
            - **Text snippets.** Define "trigger = expansion" pairs and say the trigger to type the expansion.
            - **Multilingual and translate.** Transcribe many languages, or translate your speech straight to English, using the multilingual model (Large v3 Turbo).
            - **Searchable history.** Every delivered phrase is saved locally, tagged with the app it landed in, and filterable from the dashboard.
            - **Per-app profiles.** Automatically switch output mode and developer mode based on the focused application.

            ## Install

            Download the `.exe` installer below and run it. Models download automatically on first launch. If you already have Murmur installed, it updates itself.

            Requires Windows 10/11 x64 with an AVX2-capable CPU (any Intel or AMD CPU from about 2013 onward). An NVIDIA GPU is optional and accelerates the larger models.
          releaseDraft: false
          prerelease: false
