name: Release

# Releases ship from the production branch and version themselves from
# Conventional Commits. Promote main -> production (or run this workflow
# manually) and the next version + changelog are derived from the commits since
# the last `v*` tag: feat -> minor, fix/perf -> patch, breaking -> major. A
# range with no feat/fix/perf/breaking commits releases nothing, so promoting
# docs or CI changes never cuts a release.
#
# No manual version bump is needed. The git tag is the source of truth; the
# manifest versions (Cargo.toml, tauri.conf.json) are bumped to match only
# inside the build and never committed back, which keeps this working even when
# the production branch is protected. See scripts/release.sh (run it locally to
# preview the next release).
on:
  push:
    branches: [production]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      release: ${{ steps.calc.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the commit scan can see everything back to
          # the last release.
          fetch-depth: 0

      - name: Derive version, notes, and What's New from Conventional Commits
        id: calc
        shell: bash
        run: bash scripts/release.sh release-notes.md whatsnew.data.js

      - name: Summarize decision
        shell: bash
        run: |
          if [ "${{ steps.calc.outputs.release }}" = "true" ]; then
            echo "::notice::Releasing v${{ steps.calc.outputs.version }} (${{ steps.calc.outputs.bump }} bump)."
          else
            echo "::notice::No releasable commits since the last tag; skipping."
          fi

      - name: Upload release metadata
        if: steps.calc.outputs.release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-meta
          path: |
            release-notes.md
            whatsnew.data.js
          if-no-files-found: error

  release-windows:
    needs: prepare
    if: needs.prepare.outputs.release == 'true'
    runs-on: windows-2022
    env:
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      # whisper.cpp must compile optimized. Setting CMAKE_GENERATOR to any
      # value stops cmake-rs from overriding CMAKE_*_FLAGS_RELEASE and
      # stripping /O2 (the cause of an earlier ~100x slowdown — see build.sh).
      # Ninja is used instead of the "Visual Studio" generator because CMake's
      # VS-instance detection fails on hosted runners ("could not find any
      # instance of Visual Studio"). Ninja just compiles with cl.exe from the
      # MSVC dev environment set up below — no VS detection involved. CMake's
      # default CMAKE_C_FLAGS_RELEASE (/O2 /Ob2 /DNDEBUG) still applies, so the
      # build stays optimized. AVX2 covers every Intel/AMD CPU since ~2013.
      CMAKE_GENERATOR: Ninja
      CFLAGS: /DNDEBUG /arch:AVX2
      CXXFLAGS: /DNDEBUG /arch:AVX2
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # whisper-rs uses bindgen, which needs libclang. The runner usually
      # ships LLVM, but install it if missing and export the path so the
      # build never fails on "libclang.dll not found".
      - name: Ensure LLVM/libclang
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files\LLVM\bin\libclang.dll")) {
            choco install llvm --no-progress -y
          }
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Put cl.exe and the MSVC headers/libs on PATH for the Ninja build.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja --no-progress -y
          }

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Stamp the derived version into the manifests so the installer and the
      # in-app "About" report it. Not committed: the tag created below is the
      # source of truth, and the next run derives from that tag.
      - name: Set release version
        shell: bash
        run: |
          v="${{ needs.prepare.outputs.version }}"
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/s//version = \"$v\"/" Cargo.toml
          sed -i -E "0,/(\"version\"[[:space:]]*:[[:space:]]*\")[0-9]+\.[0-9]+\.[0-9]+/s//\1$v/" crates/murmur-app/tauri.conf.json
          cargo update --workspace

      # Windows Authenticode signing via Azure Trusted Signing. Inert until the
      # signing secrets exist: with AZURE_TRUSTED_SIGNING_ENDPOINT unset this is a
      # no-op (empty `args`, the install step skipped) and the build ships
      # unsigned exactly as before. Once the AZURE_* secrets are set, Tauri signs
      # the .exe and the NSIS installer during bundling, which clears the
      # SmartScreen "unknown publisher" warning. For an EV cert + signtool
      # instead, swap the install step and the signCommand.
      - name: Configure Windows code signing (Trusted Signing, if secrets present)
        id: winsign
        shell: bash
        env:
          TS_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          TS_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          TS_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
        run: |
          if [ -z "$TS_ENDPOINT" ]; then
            echo "tauri_args=" >> "$GITHUB_OUTPUT"
            echo "::notice::Windows code signing skipped (no AZURE_TRUSTED_SIGNING_* secrets); shipping unsigned."
            exit 0
          fi
          # Tauri merges this fragment over tauri.conf.json and runs the command
          # on each artifact, replacing %1 with the file path.
          printf '{ "bundle": { "windows": { "signCommand": "trusted-signing-cli -e %s -a %s -c %s %%1" } } }' \
            "$TS_ENDPOINT" "$TS_ACCOUNT" "$TS_PROFILE" > crates/murmur-app/.winsign.conf.json
          echo "tauri_args=--config .winsign.conf.json" >> "$GITHUB_OUTPUT"
          echo "::notice::Windows code signing enabled via Azure Trusted Signing."

      - name: Install trusted-signing-cli
        if: steps.winsign.outputs.tauri_args != ''
        run: cargo install trusted-signing-cli --locked

      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-meta

      - name: Stage What's New into the frontend
        shell: bash
        run: cp whatsnew.data.js crates/murmur-app/frontend/js/whatsnew.data.js

      - name: Load release notes
        id: notes
        shell: bash
        run: |
          {
            echo 'body<<RELEASE_NOTES_EOF'
            cat release-notes.md
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — repository secret TAURI_SIGNING_PRIVATE_KEY.
          # The key has no password, so the password secret can be absent
          # (it resolves to an empty string, which the signer accepts).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Azure auth for trusted-signing-cli (DefaultAzureCredential). Absent =>
          # the signCommand never runs, so these have no effect.
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        with:
          projectPath: crates/murmur-app
          tagName: v${{ needs.prepare.outputs.version }}
          releaseName: "Murmur v${{ needs.prepare.outputs.version }}"
          # Empty unless Trusted Signing secrets are configured (see the step above).
          args: ${{ steps.winsign.outputs.tauri_args }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false

  # Runs after Windows so the GitHub release already exists; this just uploads
  # the Linux .deb and signed .AppImage to it.
  release-linux:
    needs: [prepare, release-windows]
    if: needs.prepare.outputs.release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libasound2-dev libxdo-dev \
            libx11-dev libxtst-dev libxi-dev libxcb1-dev \
            cmake clang libclang-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Set release version
        shell: bash
        run: |
          v="${{ needs.prepare.outputs.version }}"
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/s//version = \"$v\"/" Cargo.toml
          sed -i -E "0,/(\"version\"[[:space:]]*:[[:space:]]*\")[0-9]+\.[0-9]+\.[0-9]+/s//\1$v/" crates/murmur-app/tauri.conf.json
          cargo update --workspace

      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-meta

      - name: Stage What's New into the frontend
        shell: bash
        run: cp whatsnew.data.js crates/murmur-app/frontend/js/whatsnew.data.js

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          projectPath: crates/murmur-app
          tagName: v${{ needs.prepare.outputs.version }}
          args: --bundles deb,appimage

  # Runs after Windows so the GitHub release already exists; builds a universal
  # (Apple Silicon + Intel) bundle and uploads the .app/.dmg to it. Signing and
  # notarization are inert until the Apple Developer secrets exist: with
  # APPLE_SIGNING_IDENTITY unset, tauri-action builds an unsigned bundle exactly
  # like the other platforms. Once the APPLE_* secrets are set, tauri-action
  # imports the Developer ID certificate into a temporary keychain, codesigns the
  # .app with the hardened runtime, submits it to Apple's notary service, and
  # staples the ticket — clearing Gatekeeper's "unidentified developer" block.
  # Signing needs an Apple Developer account ($99/yr); until then this job still
  # ships a working (unsigned) macOS build.
  release-macos:
    needs: [prepare, release-windows]
    if: needs.prepare.outputs.release == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # macOS ships BSD sed (no `0,/re/` address, and a different -i syntax), so
      # stamp the version with perl instead — portable and first-match-only per
      # file. Mirrors the Windows/Linux "Set release version" step.
      - name: Set release version
        shell: bash
        env:
          V: ${{ needs.prepare.outputs.version }}
        run: |
          perl -i -pe 'if (!$d && /^version = "\d+\.\d+\.\d+"/) { s/\d+\.\d+\.\d+/$ENV{V}/; $d=1 }' Cargo.toml
          perl -i -pe 'if (!$d && /"version"\s*:\s*"\d+\.\d+\.\d+"/) { s/\d+\.\d+\.\d+/$ENV{V}/; $d=1 }' crates/murmur-app/tauri.conf.json
          cargo update --workspace

      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-meta

      - name: Stage What's New into the frontend
        shell: bash
        run: cp whatsnew.data.js crates/murmur-app/frontend/js/whatsnew.data.js

      - name: Report macOS signing status
        shell: bash
        run: |
          if [ -z "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
            echo "::notice::macOS signing/notarization skipped (no APPLE_* secrets); shipping an unsigned universal bundle."
          else
            echo "::notice::macOS signing + notarization enabled via Apple Developer ID."
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # whisper.cpp's ggml uses std::filesystem, which AppleClang marks
          # unavailable below macOS 10.15, so the cmake/cc build of
          # whisper-rs-sys fails without a deployment target. Force it for both
          # slices of the universal binary. Keep in sync with tauri.conf.json's
          # bundle.macOS.minimumSystemVersion.
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          # Apple Developer ID signing. Inert when unset: tauri-action only signs
          # when APPLE_SIGNING_IDENTITY is non-empty. KEYCHAIN_PASSWORD lets it
          # import APPLE_CERTIFICATE (a base64-encoded .p12) into a temp keychain.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # Notarization (Apple ID method). Only runs when all three are present;
          # required for a Developer ID build to pass Gatekeeper off the store.
          # For App Store Connect API-key auth instead, swap these for
          # APPLE_API_ISSUER / APPLE_API_KEY / APPLE_API_KEY_PATH.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/murmur-app
          tagName: v${{ needs.prepare.outputs.version }}
          args: --target universal-apple-darwin
