<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Murmur Widget</title>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <div class="stack">
    <!-- The pill. State lives in an s-* class on #widget (set by widget.js);
         the whole body except the orb button is the OS drag region. -->
    <div id="widget" class="pill s-idle" data-tauri-drag-region>
      <!-- Orb: the ripple. Clicking it toggles recording. -->
      <button id="mic-btn" class="orb" type="button" aria-label="Start recording">
        <span class="ring r1"></span>
        <span class="ring r2"></span>
        <span class="ring r3"></span>
        <span class="core"></span>
        <span class="arc" aria-hidden="true"></span>
        <span class="glyph" aria-hidden="true">!</span>
      </button>

      <span id="state-label" class="label" role="status" aria-live="polite" data-tauri-drag-region>murmur</span>

      <!-- Speech-only waveform detail; height scales with the live mic level. -->
      <div class="wave" aria-hidden="true" data-tauri-drag-region>
        <i></i><i></i><i></i><i></i><i></i><i></i><i></i>
      </div>

      <span class="spacer" data-tauri-drag-region></span>
    </div>

    <!-- Live caption: interim transcription shown while speaking. -->
    <div id="caption" class="caption" hidden>
      <span id="caption-text" class="caption__text" role="status" aria-live="polite"></span>
    </div>
  </div>
  <script src="widget.js"></script>
</body>
</html>
