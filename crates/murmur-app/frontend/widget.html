<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Murmur Widget</title>
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <div id="widget" class="widget widget--idle">
    <button id="mic-btn" class="widget__btn" aria-label="Toggle recording">
      <svg class="widget__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <span id="state-label" class="widget__label">Idle</span>
  </div>
  <script src="widget.js"></script>
</body>
</html>
