<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Murmur Widget</title>
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <div class="stack">
    <div id="widget" class="pill pill--idle" data-tauri-drag-region>
      <!-- Ambient ring (state color) -->
      <div class="pill__ring" data-tauri-drag-region></div>

      <!-- Orb -->
      <button id="mic-btn" class="pill__orb" aria-label="Start recording">
        <!-- Mic icon -->
        <svg class="pill__icon pill__icon--mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
        <!-- Stop icon -->
        <svg class="pill__icon pill__icon--stop" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <rect x="7" y="7" width="10" height="10" rx="2"/>
        </svg>
        <!-- Spinner icon -->
        <svg class="pill__icon pill__icon--spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M12 2a10 10 0 0 1 10 10"/>
        </svg>
      </button>

      <!-- Waveform -->
      <canvas id="waveform" class="pill__wave" width="200" height="40" data-tauri-drag-region></canvas>

      <!-- Label -->
      <span id="state-label" class="pill__label" role="status" aria-live="polite" data-tauri-drag-region>murmur</span>
    </div>

    <!-- Live caption: interim transcription shown while speaking. -->
    <div id="caption" class="caption" hidden>
      <span id="caption-text" class="caption__text" role="status" aria-live="polite"></span>
    </div>
  </div>
  <script src="widget.js"></script>
</body>
</html>
