# cargo-deny configuration. Mechanically enforces the dependency policy from
# CLAUDE.md: permissive licenses only (no GPL/copyleft in the shipped binary),
# no known-vulnerable or yanked crates, and crates only from crates.io.
#
# Run locally with `cargo deny check`. Enforced in CI (.github/workflows/ci.yml).

[advisories]
version = 2
# Fail on RustSec advisories and on any crate the registry has yanked. Every
# entry below is triaged with a reason; anything NOT listed still fails CI, so
# a newly introduced advisory is caught. Revisit this list on dependency bumps.
yanked = "deny"
#
# Every entry was traced to its source with `cargo tree -i <crate> --target all`.
# All are transitive through Tauri or deep build-time deps we do not control; none
# has an available fix. Each group names the crate that pulls it and the exact
# condition under which the ignore can be removed. Re-audit on `cargo update`.
ignore = [
    # gtk-rs GTK3 bindings (unmaintained): Tauri v2's Linux webview backend
    # (webkit2gtk -> gtk-rs). No maintained replacement; remove when Tauri
    # migrates off GTK3.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",

    # unic-* (unmaintained): via urlpattern 0.3 -> tauri-utils (a Tauri build
    # dependency). Remove when Tauri's urlpattern updates off the unic crates.
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident

    # Other unmaintained transitive crates, no fix available:
    "RUSTSEC-2024-0370", # proc-macro-error: build-time, via tauri macros
    "RUSTSEC-2024-0436", # paste: proc-macro, transitive
    "RUSTSEC-2025-0057", # fxhash: transitive hasher
    "RUSTSEC-2025-0119", # number_prefix: via indicatif (CLI progress bars)

    # quick-xml DoS (RUSTSEC-2026-0194 quadratic parse, -0195 unbounded
    # namespace allocation). This is the only *vulnerability* here, accepted
    # with justification:
    #   - Reached only via plist (Apple property-list parsing) inside Tauri,
    #     which parses solely the app's own bundle Info.plist at build time and
    #     on macOS at startup. There is no untrusted/network XML input path, so
    #     the DoS is not reachable in normal operation (app config is TOML).
    #   - Fixed in quick-xml >=0.41, but the latest plist (1.9.0) still requires
    #     quick-xml ^0.39, so it cannot be updated without an upstream plist
    #     release. Remove both once plist ships with quick-xml >=0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
# Permissive licenses only. The project rule is MIT / Apache-2.0; the rest of
# this list is the permissive family that transitive Rust/Tauri dependencies
# actually carry (BSD, ISC, Zlib, Unicode, and public-domain equivalents). No
# GPL/LGPL/AGPL copyleft. r-efi is offered as "MIT OR Apache-2.0 OR LGPL", so
# its permissive branch satisfies this without an exception.
confidence-threshold = 0.9
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "MPL-2.0",
    "Unlicense",
]
# webpki-roots / webpki-root-certs ship Mozilla's CA bundle under
# CDLA-Permissive-2.0 (a permissive *data* license). Scope it to those crates
# rather than widening the global allow-list.
exceptions = [
    { crate = "webpki-roots", allow = ["CDLA-Permissive-2.0"] },
    { crate = "webpki-root-certs", allow = ["CDLA-Permissive-2.0"] },
]

[bans]
# Duplicate versions bloat the binary but aren't a hard failure; surface them.
multiple-versions = "warn"
wildcards = "warn"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
